<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock 🕒</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>World Clock 🕒</h1>
      <select>
        <option value="Select a city">Select a city</option>
        <option value="Sydney">Sydney</option>
        <option value="London">London</option>
        <option value="New York">New York</option>
        <option value="Tokyo">Tokyo</option>
      </select>
      <div class="city" id="los-angeles">
        <div>
          <h2>Los Angeles</h2>
          <div class="date">March 5th 2023</div>
        </div>
        <div class="time">1:48:15 <small>AM</small></div>
      </div>
      <div class="city" id="sydney">
        <div>
          <h2>Sydney</h2>
          <div class="date">March 5th 2023</div>
        </div>
        <div class="time">3:48:15 <small>PM</small></div>
      </div>
    </div>
    <footer>
      This site was coded by
      <a href="https://github.com/amyjp17" target="_blank">Amy Pannell</a>, is
      open-sourced on
      <a href="https://github.com/amyjp17/world-clock" target="_blank"
        >GitHub</a
      >
      and hosted on
      <a href="">Netlify</a>
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
